    <script>
      // Safe Storage Polyfills for sandboxed iframes and privacy-focused browsers
      (function() {
        function checkStorage(type) {
          try {
            const storage = window[type];
            if (!storage) return false;
            storage.setItem('__test_storage__', '1');
            storage.removeItem('__test_storage__');
            return true;
          } catch (e) {
            return false;
          }
        }

        if (!checkStorage('localStorage')) {
          console.warn("localStorage Access Denied. Polyfilling in-memory fallback.");
          const memoryStore = {};
          const mockStorage = {
            getItem: function(key) { return key in memoryStore ? memoryStore[key] : null; },
            setItem: function(key, value) { memoryStore[key] = String(value); },
            removeItem: function(key) { delete memoryStore[key]; },
            clear: function() { for (const k in memoryStore) delete memoryStore[k]; },
            key: function(index) { return Object.keys(memoryStore)[index] || null; },
            get length() { return Object.keys(memoryStore).length; }
          };
          Object.defineProperty(window, 'localStorage', {
            value: mockStorage,
            writable: true,
            configurable: true
          });
        }

        if (!checkStorage('sessionStorage')) {
          console.warn("sessionStorage Access Denied. Polyfilling in-memory fallback.");
          const memoryStore = {};
          const mockStorage = {
            getItem: function(key) { return key in memoryStore ? memoryStore[key] : null; },
            setItem: function(key, value) { memoryStore[key] = String(value); },
            removeItem: function(key) { delete memoryStore[key]; },
            clear: function() { for (const k in memoryStore) delete memoryStore[k]; },
            key: function(index) { return Object.keys(memoryStore)[index] || null; },
            get length() { return Object.keys(memoryStore).length; }
          };
          Object.defineProperty(window, 'sessionStorage', {
            value: mockStorage,
            writable: true,
            configurable: true
          });
        }
      })();
    </script>
